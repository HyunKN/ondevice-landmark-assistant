[paths]
assets_dir = "./assets"
log_path = "./logs/demo_int8.jsonl"
checkpoint = "./best.pt"
mobile_artifact_dir = "./mobile_artifacts_int8"

[runtime]
device = "cpu"
inference_backend = "onnx"
warmup_on_start = true

[fusion]
reject_threshold = 0.25
image_only = { w_image = 1.0, w_text = 0.0, w_keyword = 0.0 }
text_only = { w_image = 0.0, w_text = 0.6, w_keyword = 0.4 }

[policy]
reject_threshold = 0.25
weak_reject_threshold = 0.35
weak_margin = 0.12
match_threshold = 0.60
match_floor = 0.50
match_margin = 0.20
isolated_match_threshold = 0.40
isolated_match_margin = 0.30
isolated_match_top2_max = 0.10
text_no_keyword_reject_threshold = 0.35

[ui]
title = "Landmark Assistant (INT8 ONNX)"
max_image_mb = 10
slow_inference_ms = 5000
